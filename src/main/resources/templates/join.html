<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Chain | Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen py-12">

    <div class="w-full max-w-lg p-8">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">회원가입</h1>
            <p class="text-slate-400 text-sm mt-2 font-medium">기여하고 보상받는 C-Chain의 일원이 되어주세요.</p>
        </div>

        <div class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100">
            <form action="/join" method="POST" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Username (ID)</label>
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        <input type="text" name="userid" required
                            class="w-full pl-12 pr-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition" 
                            placeholder="사용하실 아이디를 입력하세요">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Email</label>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        <input type="email" name="email" required
                            class="w-full pl-12 pr-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition" 
                            placeholder="example@c-chain.com">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Password</label>
                        <input type="password" name="userpw" required
                            class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition" 
                            placeholder="비밀번호">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Confirm</label>
                        <input type="password" name="confirm_password" required
                            class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition" 
                            placeholder="비밀번호 확인">
                    </div>
                    <div class="mb-4">
    <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">ERC-20 Wallet Address (Optional)</label>
    <div class="relative">
        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
            <i class="fa-solid fa-wallet"></i>
        </span>
        <input type="text" name="walletaddress" placeholder="0x..." 
               class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
    </div>
    <p class="text-[10px] text-gray-400 mt-1">* 보상을 받으실 지갑 주소를 입력해주세요. 나중에 등록 가능합니다.</p>
</div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition shadow-xl active:scale-[0.98]">
                        계정 생성하기
                    </button>
                </div>
            </form>

            <div class="mt-8 text-center text-sm">
                <span class="text-slate-400">이미 계정이 있으신가요?</span>
                <a href="/login" class="ml-2 text-blue-600 font-bold hover:underline">로그인</a>
            </div>
        </div>
    </div>

</body>
</html>
