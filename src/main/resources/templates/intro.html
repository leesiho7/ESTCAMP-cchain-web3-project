<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Chain | Experience Web3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        :root {
            --bg-top: #e0eafc;
            --bg-bottom: #cfdef3;
            --text-color: #4a5568;
        }
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
            font-family: 'Inter', -apple-system, sans-serif;
            cursor: pointer; /* 클릭 유도 */
        }
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-color);
            pointer-events: none;
            z-index: 10;
            transition: opacity 1s ease;
        }
        .logo-text {
            font-size: 14px;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            font-weight: 300;
            margin-top: 220px; 
            opacity: 0.7;
        }
        .project-name {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.1em;
            margin-bottom: 5px;
        }
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            letter-spacing: 0.2em;
            color: #718096;
            animation: bounce 2s infinite;
            transition: opacity 0.5s ease;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0) translateX(-50%);}
            40% {transform: translateY(-10px) translateX(-50%);}
        }
        /* 전환 시 텍스트 사라짐 효과 */
        .fade-out { opacity: 0 !important; }
    </style>
</head>
<body>

<div class="overlay" id="ui-overlay">
    <div class="project-name">C-CHAIN</div>
    <div class="logo-text">Knowledge Assetization</div>
</div>
<div class="scroll-hint" id="hint">CLICK TO ENTER ECOSYSTEM</div>

<script>
    let particles = [];
    const numParticles = 400;
    let mode = 'intro'; // 'intro' -> 'transition'
    let transitionAlpha = 0;

    function setup() {
        createCanvas(windowWidth, windowHeight);
        for (let i = 0; i < numParticles; i++) {
            particles.push(new Particle());
        }
    }

    function draw() {
        // 부드러운 잔상 효과
        background(224, 234, 252, mode === 'transition' ? 80 : 40); 
        
        if (mode === 'transition') {
            transitionAlpha += 4; // 화면 페이드 아웃 속도
        }

        translate(width / 2, height / 2);

        // 1. 이더리움 중앙 로고 가이드 (전환 시 투명해짐)
        drawEthereumLogo(255 - transitionAlpha);

        // 2. 파티클 업데이트 및 렌더링
        particles.forEach(p => {
            p.update();
            p.display(transitionAlpha);
        });

        // 3. 화면 전체 덮개 (최종 페이드 아웃)
        if (transitionAlpha > 0) {
            resetMatrix();
            noStroke();
            fill(255, 255, 255, transitionAlpha);
            rect(0, 0, width, height);
        }
    }

    function mousePressed() {
        if (mode === 'intro') {
            mode = 'transition';
            
            // UI 요소 숨기기
            document.getElementById('ui-overlay').classList.add('fade-out');
            document.getElementById('hint').classList.add('fade-out');

            // 눈꽃 효과: 파티클 반경과 속도 폭발
            particles.forEach(p => {
                p.speed *= 8; 
                p.explosionMode = true;
            });
            
            // 1.5초 후 로그인 페이지로 이동
            setTimeout(() => {
                // 부트캠프 프로젝트의 실제 로그인 경로로 수정하세요
                window.location.href = '/login'; 
            }, 1500);
        }
    }

    function drawEthereumLogo(alpha) {
        if (alpha <= 0) return;
        noFill();
        stroke(100, 130, 180, alpha * 0.5);
        strokeWeight(1);
        beginShape();
        vertex(0, -110); 
        vertex(60, 0);   
        vertex(0, 110);  
        vertex(-60, 0);  
        endShape(CLOSE);
        line(-60, 0, 60, 0);
        line(0, -110, 0, 110);
    }

    class Particle {
        constructor() {
            this.init();
            this.explosionMode = false;
        }

        init() {
            this.angle = random(TWO_PI);
            this.radius = random(50, 350);
            this.speed = random(0.002, 0.01);
            this.size = random(1, 4);
            this.opac = random(100, 200);
            this.x = 0;
            this.y = 0;
        }

        update() {
            this.angle += this.speed;
            
            if (this.explosionMode) {
                this.radius += 15; // 밖으로 퍼져나가는 효과
            }

            // 다이아몬드 궤적 수학적 모델링
            this.x = cos(this.angle) * this.radius * (1 + sin(this.angle * 2) * 0.05);
            this.y = sin(this.angle) * this.radius * 1.4; 
        }

        display(extraAlpha) {
            let finalOpac = this.opac - extraAlpha;
            if (finalOpac < 0) return;
            
            noStroke();
            fill(100, 130, 180, finalOpac);
            ellipse(this.x, this.y, this.size);
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>
</body>
</html>
