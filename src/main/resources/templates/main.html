<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Chain | Contribution Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js" type="application/javascript"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .slide-panel { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .doc-completed { background-color: #f3f4f6 !important; opacity: 0.7; border-color: #d1d5db !important; pointer-events: none; position: relative; }
        .completed-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); border: 3px solid #9ca3af; color: #9ca3af; padding: 4px 12px; font-weight: 900; text-transform: uppercase; border-radius: 8px; z-index: 10; background: rgba(255, 255, 255, 0.8); }
    </style>
</head>
<body class="bg-gray-50 h-screen overflow-hidden">

    <header class="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm relative z-30">
        <div class="flex items-center space-x-2">
            <span class="text-blue-600 text-2xl font-bold"><i class="fa-solid fa-link"></i> C-Chain</span>
            <span class="text-gray-400">|</span>
            <h1 class="text-lg font-semibold text-gray-700">한-중 기술 기여 대시보드</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="text-right mr-4">
                <p class="text-[10px] text-gray-400 uppercase font-bold">My Rewards</p>
                <p class="text-sm font-bold text-blue-600"><span id="top-balance">0.0</span> OMT</p>
            </div>
            <button id="connect-wallet-btn" onclick="connectWallet()" class="flex items-center gap-2 px-5 py-2.5 bg-white border border-slate-200 text-slate-700 rounded-xl font-bold hover:bg-slate-50 transition shadow-sm">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg" class="w-5 h-5">
                <span id="wallet-status" class="text-sm">지갑 연결</span>
            </button>
            <button onclick="location.href='/mypage'" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm hover:bg-black transition">마이페이지</button>
            <button onclick="logoutAll()" class="border border-gray-300 text-gray-600 px-4 py-2 rounded-lg text-sm hover:bg-gray-100 transition">로그아웃</button>
        </div>
    </header>

    <main class="p-8 h-[calc(100vh-73px)] overflow-y-auto">
        <div class="max-w-6xl mx-auto text-center py-20" th:if="${documents == null}">
            <p class="text-gray-400">불러올 문서가 없습니다.</p>
        </div>
    </main>

    <div id="tx-loader" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center text-white">
        <div class="w-20 h-20 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
        <p class="mt-6 font-bold">C-Chain 네트워크에 기록 중...</p>
    </div>

<script>
    // 💡 중요: 본인의 OMT 컨트랙트 주소로 꼭 바꾸세요!
    const OMT_ADDRESS = "0x여러분의_OMT_주소_입력"; 
    const OMT_ABI = [
        "function balanceOf(address owner) view returns (uint256)",
        "function decimals() view returns (uint8)"
    ];

    let provider;
    let signer;
    let currentDocId = null;

    // 1. 지갑 연결 함수
    async function connectWallet() {
        if (typeof window.ethereum !== 'undefined') {
            try {
                // 메타마스크 연결 요청
                const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
                const account = accounts[0];
                
                // 버튼 텍스트 변경 (앞뒤 주소만 표시)
                document.getElementById('wallet-status').innerText = 
                    account.substring(0, 6) + "..." + account.substring(account.length - 4);
                
                // 잔액 업데이트 실행
                updateOMTBalance(account);
            } catch (error) {
                console.error("지갑 연결 실패:", error);
            }
        } else {
            alert("메타마스크를 설치해주세요!");
        }
    }

    // 2. OMT 잔액 조회 함수
    async function updateOMTBalance(walletAddress) {
        try {
            provider = new ethers.providers.Web3Provider(window.ethereum);
            const contract = new ethers.Contract(OMT_ADDRESS, OMT_ABI, provider);
            
            const balance = await contract.balanceOf(walletAddress);
            const decimals = await contract.decimals();
            
            // 웨이(Wei) 단위를 읽기 쉬운 숫자로 변환
            const formattedBalance = ethers.utils.formatUnits(balance, decimals);
            
            // 화면에 반영 (소수점 2자리까지)
            document.getElementById('top-balance').innerText = parseFloat(formattedBalance).toFixed(2);
        } catch (error) {
            console.error("잔액 조회 중 에러:", error);
            document.getElementById('top-balance').innerText = "Error";
        }
    }

    // 페이지 로드 시 이미 연결되어 있다면 자동으로 잔액 조회
    window.addEventListener('load', async () => {
        if (window.ethereum) {
            const accounts = await ethereum.request({ method: 'eth_accounts' });
            if (accounts.length > 0) {
                connectWallet();
            }
        }
    });

    // (기존 openWorkspace, submitWork 등 함수들 아래에 유지)
    function openWorkspace(element) { /* 기존 코드 */ }
    function closeWorkspace() { /* 기존 코드 */ }
    async function submitWork() { /* 기존 코드 */ }
    function logoutAll() { /* 기존 코드 */ }
</script>
</body>
</html>
