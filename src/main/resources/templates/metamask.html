<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Chain | Wallet Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
     <script src="https://unpkg.com/@metamask/sdk@0.14.1/dist/browser/metamask-sdk.js"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-8">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-orange-500 text-white rounded-2xl shadow-xl shadow-orange-100 mb-4">
                <i class="fa-solid fa-wallet text-3xl"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tight">Wallet Connect</h1>
            <p class="text-slate-400 text-sm mt-2">메타마스크 지갑을 연결하여 토큰을 관리하세요.</p>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 text-center">
            <div id="walletInfo" class="space-y-6">
                <div id="loggedOutUI">
                    <div class="bg-slate-50 border border-dashed border-slate-200 rounded-2xl p-8 mb-6">
                        <i class="fa-solid fa-shield-halved text-4xl text-slate-300 mb-3"></i>
                        <p class="text-slate-500 text-sm font-medium">연결된 지갑이 없습니다.</p>
                    </div>
                    
                    <button onclick="connectWallet()" 
                        class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100 active:scale-[0.98] flex items-center justify-center gap-2">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg" class="w-5 h-5">
                        MetaMask 연결하기
                    </button>
                </div>

                <div id="loggedInUI" class="hidden animate-fade-in">
                    <div class="bg-emerald-50 border border-emerald-100 rounded-2xl p-6 mb-6">
                        <label class="block text-[10px] font-black text-emerald-600 uppercase mb-2 tracking-widest">Connected Address</label>
                        <p id="userAddress" class="text-slate-700 font-mono text-sm break-all leading-relaxed"></p>
                    </div>
                    
                    <div class="flex flex-col gap-3">
                        <div class="flex justify-between items-center px-2">
                            <span class="text-xs font-bold text-slate-400 uppercase">Status</span>
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800">
                                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 mr-1.5"></span>
                                Online
                            </span>
                        </div>
                        <button onclick="location.href='/wallet'" 
                            class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold hover:bg-slate-900 transition shadow-lg shadow-slate-200">
                            내 자산 확인하기
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <p class="text-center text-slate-400 text-xs mt-8 font-medium italic">Verified by C-Chain Blockchain Network</p>
    </div>

<script th:inline="javascript">
    async function connectWallet() {
        if (!window.ethereum) {
            alert("메타마스크를 설치해주세요!");
            return;
        }

        try {
            const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
            const address = accounts[0];

            // 서명 메시지 생성
            const message = `C-Chain 인증\n주소: ${address}\n일시: ${new Date().toLocaleString()}`;
            const signature = await ethereum.request({
                method: 'personal_sign',
                params: [message, address],
            });

            if (signature) {
                const isSaved = await sendToBackend(address, signature);
                if (isSaved) {
                    alert("인증 성공! 대시보드로 이동합니다.");
                    window.location.replace("/wallet-dashboard"); // 확실한 리다이렉트
                } else {
                    alert("인증 실패: DB 등록 정보를 확인하세요.");
                }
            }
        } catch (err) {
            console.error(err);
            alert("연결 취소 또는 오류 발생");
        }
    }

    async function sendToBackend(address, signature) {
        const res = await fetch('/api/token/balance', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ walletAddress: address, signature: signature })
        });
        const data = await res.json();
        return data.success;
    }
</script>

    <style>
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fade-in 0.5s ease-out forwards; }
    </style>
</body>
</html>
