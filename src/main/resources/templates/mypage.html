<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Chain | My Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm">
        <div onclick="location.href='/'" class="flex items-center space-x-2 cursor-pointer">
            <span class="text-blue-600 text-2xl font-bold"><i class="fa-solid fa-link"></i> C-Chain</span>
            <span class="text-gray-400">|</span>
            <h1 class="text-lg font-semibold text-gray-700">마이페이지</h1>
        </div>
        <button onclick="history.back()" class="text-gray-500 hover:text-gray-800 transition text-sm font-medium">
            <i class="fa-solid fa-arrow-left mr-1"></i> 돌아가기
        </button>
    </header>

    <main class="max-w-5xl mx-auto py-10 px-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 flex flex-col items-center">
                    <h3 class="text-gray-500 text-sm font-bold uppercase tracking-widest mb-6">Asset Distribution</h3>
                    <div class="relative w-48 h-48 mb-6">
                        <canvas id="assetChart"></canvas>
                        <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
                            <div th:if="${isWalletConnected}" class="flex flex-col items-center justify-center">
                                <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">My OMT</span>
                                <span class="text-2xl font-black text-gray-800" th:text="${omtBalance != null ? omtBalance : '0.00'}">0.00</span>
                            </div>
                        </div>
                    </div>
                    <div class="w-full space-y-3">
                        <div class="flex justify-between items-center pb-2 border-b border-gray-50">
                            <span class="text-sm font-bold text-blue-600">OMT 토큰</span>
                            <span class="font-black text-gray-800" th:text="${omtBalance != null ? omtBalance + ' OMT' : '0 OMT'}">0 OMT</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                        <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Translated</p>
                        <p class="text-xl font-black text-gray-800" th:text="${stats?.translatedDocs}">0</p>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                        <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Verified</p>
                        <p class="text-xl font-black text-gray-800" th:text="${stats?.verifiedCases}">0</p>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                        <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Rank</p>
                        <p class="text-xl font-black text-blue-600" th:text="${stats?.rank}">TOP 3%</p>
                    </div>
                </div>

                <div class="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden">
                    <div class="px-8 py-6 border-b flex justify-between items-center bg-gray-50/50">
                        <h4 class="font-bold text-gray-800">최근 기여 활동 기록</h4>
                    </div>
                    <div class="divide-y">
                        <div th:if="${stats != null and stats.recentActivities != null}"
                             th:each="activity : ${stats.recentActivities}" 
                             class="px-8 py-5 flex items-center hover:bg-gray-50 transition">
                             
                            <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mr-4">
                                <i class="fa-solid fa-link text-sm"></i>
                            </div>
                            <div class="flex-1 overflow-hidden">
                                <p th:text="${activity.contentKr}" class="text-sm font-bold text-gray-800 leading-tight mb-1 truncate pr-4">번역 내용 요약</p>
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-mono text-blue-400 truncate max-w-[200px]" th:text="${activity.blockchainHash}">0xhash...</span>
                                    <span class="text-[9px] px-1.5 py-0.5 bg-green-50 text-green-600 rounded font-bold">On-Chain</span>
                                </div>
                            </div>
                            <div class="text-right shrink-0">
                                <p class="text-sm font-black text-blue-600">+10 C</p>
                                <a th:href="'https://sepolia.etherscan.io/tx/' + ${activity.blockchainHash}" 
                                   target="_blank" 
                                   class="text-[10px] text-gray-300 hover:text-blue-500 underline transition">VIEW TX</a>
                            </div>
                        </div>
                        
                        <div th:if="${stats == null or #lists.isEmpty(stats.recentActivities)}" 
                             class="px-8 py-16 text-center">
                           <i class="fa-solid fa-inbox text-gray-200 text-4xl mb-4"></i>
                           <p class="text-gray-400 text-sm">최근 활동 기록이 없습니다.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script th:inline="javascript">
        const omtBalance = /*[[${omtBalance != null ? omtBalance : 0}]]*/ 0;
        const contribution = /*[[${contributionReward != null ? contributionReward : 0}]]*/ 0;
        const verification = /*[[${verificationReward != null ? verificationReward : 0}]]*/ 0;

        const ctx = document.getElementById('assetChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['OMT 토큰', '기여 보상', '검증 보상'],
                datasets: [{
                    data: [omtBalance, contribution, verification],
                    backgroundColor: ['#2563eb', '#60a5fa', '#c7d2fe'],
                    borderWidth: 0
                }]
            },
            options: {
                cutout: '80%',
                plugins: { legend: { display: false } }
            }
        });
    </script>
</body>
</html>
