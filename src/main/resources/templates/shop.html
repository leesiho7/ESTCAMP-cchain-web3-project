<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>상품 구매</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white rounded-2xl shadow-lg p-6 w-96 space-y-5">

    <!-- 페이지 제목 -->
    <h2 class="text-xl font-black text-gray-800 text-center">
        새로 올라왔어요
    </h2>

    <!-- 상품 카드 -->
    <div class="border rounded-2xl overflow-hidden">

        <!-- 상품 이미지 -->
        <img
            src="/images/megabox-coffee.png"
            alt="메가박스 커피 쿠폰"
            class="w-full h-48 object-cover"
        />

        <!-- 상품 정보 -->
        <div class="p-4 space-y-2">
            <div class="flex justify-between items-center">
                <span class="font-bold text-gray-800">
                    메가박스 커피 쿠폰
                </span>
                <span class="font-black text-blue-600">
                    300 C
                </span>
            </div>

            <p class="text-sm text-gray-500">
                메가박스 매점에서 사용 가능한 커피 1잔 쿠폰입니다.
            </p>

            <!-- 구매 버튼 -->
            <form method="post" action="/shop/buy">
                <input type="hidden" name="productId" value="MEGABOX_COFFEE_01" />
                <button
                    type="submit"
                    class="w-full mt-3 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold transition"
                >
                    코인으로 구매하기
                </button>
            </form>
        </div>
    </div>
