# 1. Server Port
server.port=${PORT:8080}

# 2. MySQL Database Settings
# Railway의 다양한 변수 명칭에 대응하며, 연결 실패 시 원인을 더 명확히 알 수 있도록 기본값을 제거하거나 조정합니다.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# MYSQLHOST가 없으면 MYSQL_HOST를 찾고, 그것도 없으면 localhost를 사용합니다.
# DB 이름도 cchain에서 railway(기본값)로 시도해 봅니다.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:${MYSQL_HOST:localhost}}:${MYSQLPORT:${MYSQL_PORT:3306}}/${MYSQLDATABASE:${MYSQL_DATABASE:railway}}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${MYSQLUSER:${MYSQL_USER:root}}
spring.datasource.password=${MYSQLPASSWORD:${MYSQL_PASSWORD:12345}}

# JPA/Hibernate 설정
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 4. Web3j / ERC-20 Token Settings
ethereum.rpc.url=${ETHEREUM_RPC_URL}
token.contract.address=${TOKEN_CONTRACT_ADDRESS}
ethereum.wallet.private-key=${ETHEREUM_WALLET_PRIVATE_KEY}
ethereum.admin.address=${ETHEREUM_ADMIN_ADDRESS}

# Gemini API 설정
openai.api.key=${OPENAI_API_KEY}

# 5. File Upload Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 6. Redis Settings
# Railway Redis 서비스는 REDISHOST, REDISPORT, REDISPASSWORD를 제공합니다.
spring.data.redis.host=${REDISHOST:localhost}
spring.data.redis.port=${REDISPORT:6379}
spring.data.redis.password=${REDISPASSWORD:}
