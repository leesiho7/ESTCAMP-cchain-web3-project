# 1. Server Port
# Railway가 동적으로 할당하는 PORT 환경 변수를 우선 사용합니다.
server.port=${PORT:8080}

# 2. MySQL Database Settings
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Railway 내부 네트워크 주소를 우선 참조하도록 설정했습니다.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:mysql.railway.internal}:${MYSQLPORT:3306}/${MYSQLDATABASE:railway}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:12345}

# 3. JPA/Hibernate 설정 (핵심 수정 구역)
# 최초 실행 시 테이블 생성을 확실히 하기 위해 'update'를 유지하되, 
# 'users' 에러 방지를 위해 네이밍 전략을 추가했습니다.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.generate-ddl=true
# 최신 MySQL 버전에 맞게 Dialect를 명시합니다.
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# [추가됨] 자바의 @Entity를 DB 테이블명으로 바꿀 때 단어 그대로(Physical) 사용하도록 강제합니다.
# 이 설정을 넣어야 @Table(name="users")라고 적었을 때 DB에도 정확히 'users'로 생깁니다.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# 4. Web3j / ERC-20 Token Settings
ethereum.rpc.url=${ETHEREUM_RPC_URL}
token.contract.address=${TOKEN_CONTRACT_ADDRESS}
ethereum.wallet.private-key=${ETHEREUM_WALLET_PRIVATE_KEY}
ethereum.admin.address=${ETHEREUM_ADMIN_ADDRESS}

# Gemini / OpenAI API 설정
openai.api.key=${OPENAI_API_KEY}

# 5. File Upload Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 6. Redis Settings
spring.data.redis.host=${REDISHOST:localhost}
spring.data.redis.port=${REDISPORT:6379}
spring.data.redis.password=${REDISPASSWORD:}