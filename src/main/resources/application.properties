# 1. Server Port
server.port=${PORT:8080}

# 2. MySQL Database Settings
# Railway의 'MYSQL_URL'을 사용하거나 개별 변수를 조합합니다.
# JDBC URL에 jdbc:mysql://를 강제로 붙여서 Railway 변수와 호환성을 높입니다.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE:railway}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

# JPA/Hibernate 설정
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 4. Web3j / ERC-20 Token Settings
ethereum.rpc.url=${ETHEREUM_RPC_URL}
token.contract.address=${TOKEN_CONTRACT_ADDRESS}
ethereum.wallet.private-key=${ETHEREUM_WALLET_PRIVATE_KEY}
ethereum.admin.address=${ETHEREUM_ADMIN_ADDRESS}

# Gemini API 설정
openai.api.key=${OPENAI_API_KEY}

# 5. File Upload Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 6. Redis Settings
# Railway Redis 서비스는 REDISHOST, REDISPORT, REDISPASSWORD를 제공합니다.
spring.data.redis.host=${REDISHOST:localhost}
spring.data.redis.port=${REDISPORT:6379}
spring.data.redis.password=${REDISPASSWORD:}
