<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>C-Chain AI Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-xl border border-slate-100">
        <div class="flex items-center gap-3 mb-8">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg">
                <i class="fa-solid fa-microchip"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800">AI 검증 <span class="text-blue-600">테스트 랩</span></h2>
        </div>
        
        <div class="space-y-4">
            <label class="text-xs font-black text-slate-400 uppercase tracking-widest">테스트 입력 (문장)</label>
            <input type="text" id="userInput" 
                   class="w-full border-2 border-slate-50 bg-slate-50 rounded-2xl px-6 py-4 focus:bg-white focus:border-blue-500 outline-none transition-all text-slate-700 font-bold"
                   placeholder="아무 문장이나 입력해 보세요...">
            
            <button onclick="runTest()" 
                    class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl hover:bg-blue-600 transition-all shadow-xl active:scale-95">
                AI 분석 실행
            </button>
        </div>

        <div class="mt-10">
            <div class="flex justify-between items-center mb-3">
                <p class="text-xs font-black text-slate-400 uppercase tracking-widest">분석 결과</p>
                <span id="statusBadge" class="hidden text-[10px] font-black px-2 py-1 rounded bg-green-100 text-green-600">SUCCESS</span>
            </div>
            <pre id="result" class="bg-slate-900 p-6 rounded-3xl text-[13px] text-blue-400 overflow-x-auto border border-slate-800 min-h-[150px] font-mono shadow-inner">기다리는 중...</pre>
        </div>
        
        <div class="mt-8 flex justify-center">
            <a href="/admin" class="text-slate-400 text-xs font-bold hover:text-slate-600 transition-colors underline decoration-slate-200 underline-offset-4">관리자 페이지로 돌아가기</a>
        </div>
    </div>

    <script>
        async function runTest() {
            const msg = document.getElementById('userInput').value;
            const resultDiv = document.getElementById('result');
            const badge = document.getElementById('statusBadge');
            
            resultDiv.innerText = "// AI 분석 중입니다. 잠시만 기다려 주세요...";
            resultDiv.style.color = "#94a3b8";
            badge.classList.add('hidden');

            try {
                const response = await fetch(`/api/ai/test?msg=${encodeURIComponent(msg)}`);
                const data = await response.json(); // JSON으로 받기
                
                // 결과 출력 (JSON 들여쓰기 포함)
                resultDiv.innerText = JSON.stringify(data, null, 4);
                resultDiv.style.color = "#60a5fa";
                badge.classList.remove('hidden');
            } catch (error) {
                resultDiv.innerText = "// 에러 발생\n" + error.message;
                resultDiv.style.color = "#fb7185";
            }
        }
    </script>
</body>
</html>
